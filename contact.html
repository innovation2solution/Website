<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Innovation2Solution Strategic Audit</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200">
    <main class="pt-40 pb-20 px-6 max-w-4xl mx-auto">
        <div class="mb-16 text-center">
            <h2 class="text-4xl md:text-5xl font-bold text-white mb-6">Strategic <span class="text-[#38bdf8]">Consultation</span></h2>
            <p class="text-slate-400">Brief our team on your project requirements below.</p>
        </div>

        <div class="p-8 bg-slate-900/50 border border-slate-800 rounded-3xl backdrop-blur-sm">
            <form id="contact-form" action="https://formspree.io/f/mlgodgzq" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" name="name" placeholder="Full Name" required class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]">
                    <input type="email" name="email" placeholder="Corporate Email" required class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" name="company" placeholder="Company Name" required class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]">
                    <input type="tel" name="phone" placeholder="Phone Number" class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]">
                </div>
                <select name="service" class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]">
                    <option>AI Strategy & Sovereignty</option>
                    <option>Enterprise Architecture</option>
                    <option>App/Mobile Development</option>
                </select>
                <textarea name="message" rows="5" placeholder="Challenge Overview..." required class="w-full bg-[#020617] border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8]"></textarea>
                <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] hover:bg-[#c2410c] text-white font-bold py-4 rounded-xl transition shadow-lg">Request Strategic Consultation</button>
                <p id="form-status" class="hidden mt-4 text-center font-bold"></p>
            </form>
        </div>
    </main>
    <script src="nav.js"></script>
</body>
</html>
