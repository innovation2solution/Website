<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Innovation2Solution Strategic Audit</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200">
    <main class="pt-48 pb-20 px-6 max-w-4xl mx-auto">
        <header class="mb-16 text-center">
            <h2 class="text-4xl md:text-6xl font-extrabold text-white mb-6">
                Strategic <span class="text-[#38bdf8]">Consultation</span>
            </h2>
            <p class="text-slate-400 text-lg">Brief our team on your enterprise requirements below to begin your audit.</p>
        </header>

        <div class="glass-card p-8 md:p-12 relative overflow-hidden group">
            <div class="card-accent bg-[#ea580c]"></div> <form id="contact-form" action="https://formspree.io/f/mlgodgzq" method="POST" class="space-y-6 relative z-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Full Name</label>
                        <input type="text" name="name" placeholder="John Doe" required class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Corporate Email</label>
                        <input type="email" name="email" placeholder="john@company.com" required class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Company</label>
                        <input type="text" name="company" placeholder="Enterprise Ltd" required class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Phone</label>
                        <input type="tel" name="phone" placeholder="+44..." class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Primary Interest</label>
                    <select name="service" class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] appearance-none cursor-pointer">
                        <option>AI Strategy & Sovereignty</option>
                        <option>Enterprise Architecture</option>
                        <option>App/Mobile Development</option>
                        <option>General Inquiry</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-500 ml-1">Challenge Overview</label>
                    <textarea name="message" rows="5" placeholder="Describe your current technical bottleneck..." required class="w-full bg-[#020617]/50 border border-slate-800 p-4 rounded-xl text-white outline-none focus:border-[#38bdf8] transition-all"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-[#ea580c] hover:bg-[#c2410c] text-white font-bold py-5 rounded-xl transition-all shadow-2xl transform hover:scale-[1.01] active:scale-[0.99]">
                    Request Strategic Consultation
                </button>
                <p id="form-status" class="hidden mt-4 text-center font-bold"></p>
            </form>
        </div>
    </main>

    <script src="nav.js"></script>
</body>
</html>
